services:
  db:
    image: postgres:16
    container_name: taskflow-db
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./server/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
  api:
    build:
      context: ./server
    container_name: taskflow-api
    environment:
      PORT: 3000
      DATABASE_URL: postgres://taskflow:taskflow@db:5432/taskflow
      JWT_SECRET: taskflow-secret
    ports:
      - "3000:3000"
    depends_on:
      - db
volumes:
  db_data: