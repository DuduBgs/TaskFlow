<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TaskFlow</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- ── Tela de Login / Registro ── -->
    <div class="auth-screen" id="authScreen">
      <div class="auth-card">
        <p class="eyebrow">TaskFlow</p>
        <h1>Bem-vindo de volta.</h1>
        <p class="auth-lead">Gerencie tarefas com foco.</p>

        <div class="auth-tabs">
          <button class="tab-btn active" id="tabLogin" type="button">Entrar</button>
          <button class="tab-btn" id="tabRegister" type="button">Criar conta</button>
        </div>

        <form id="loginForm" class="auth-form">
          <label>
            Email
            <input type="email" name="email" required autocomplete="email" />
          </label>
          <label>
            Senha
            <input type="password" name="password" required autocomplete="current-password" />
          </label>
          <button type="submit">Entrar</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <label>
            Nome
            <input type="text" name="name" required autocomplete="name" />
          </label>
          <label>
            Email
            <input type="email" name="email" required autocomplete="email" />
          </label>
          <label>
            Senha
            <input type="password" name="password" required autocomplete="new-password" />
          </label>
          <button type="submit">Criar conta</button>
        </form>

        <p class="auth-error" id="authError"></p>
      </div>
    </div>

    <!-- ── Tela Principal do App ── -->
    <div class="app-screen hidden" id="appScreen">

      <header class="app-header">
        <p class="eyebrow app-logo">TaskFlow</p>
        <div class="header-right">
          <div class="user-avatar" id="userAvatar" title="Clique para sair">?</div>
        </div>
      </header>

      <div class="app-content">

        <section class="card">
          <h2>Nova tarefa</h2>
          <form id="taskForm" class="task-form">
            <label>
              Titulo
              <input type="text" name="title" required />
            </label>
            <label>
              Descricao
              <input type="text" name="description" />
            </label>
            <label>
              Prazo
              <input type="date" name="dueDate" />
            </label>
            <label>
              Status
              <select name="status">
                <option value="pendente">Pendente</option>
                <option value="em andamento">Em andamento</option>
                <option value="concluida">Concluida</option>
              </select>
            </label>
            <label>
              Responsavel
              <input type="text" name="assignee" />
            </label>
            <button type="submit">Salvar tarefa</button>
          </form>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>Quadro Kanban</h2>
            <div class="board-controls">
              <input
                class="search-input"
                id="searchInput"
                type="text"
                placeholder="Buscar por titulo ou responsavel..."
              />
              <button class="ghost" id="refreshButton" type="button">Recarregar</button>
            </div>
          </div>
          <div class="kanban">
            <div class="kanban-column">
              <div class="column-header pendente-header">
                <span class="column-title">Pendente</span>
                <span class="column-count" id="count-pendente">0</span>
              </div>
              <div class="column-cards" id="col-pendente"></div>
            </div>
            <div class="kanban-column">
              <div class="column-header andamento-header">
                <span class="column-title">Em Andamento</span>
                <span class="column-count" id="count-andamento">0</span>
              </div>
              <div class="column-cards" id="col-em-andamento"></div>
            </div>
            <div class="kanban-column">
              <div class="column-header concluida-header">
                <span class="column-title">Concluida</span>
                <span class="column-count" id="count-concluida">0</span>
              </div>
              <div class="column-cards" id="col-concluida"></div>
            </div>
          </div>
        </section>

      </div>
    </div>

    <!-- ── Modal de Edicao ── -->
    <div class="modal-overlay" id="editModal">
      <div class="modal">
        <div class="modal-header">
          <h2>Editar tarefa</h2>
          <button class="ghost" id="closeModalButton" type="button">Fechar</button>
        </div>
        <form id="editForm" class="task-form">
          <input type="hidden" name="id" />
          <label>
            Titulo
            <input type="text" name="title" required />
          </label>
          <label>
            Descricao
            <input type="text" name="description" />
          </label>
          <label>
            Prazo
            <input type="date" name="dueDate" />
          </label>
          <label>
            Status
            <select name="status">
              <option value="pendente">Pendente</option>
              <option value="em andamento">Em andamento</option>
              <option value="concluida">Concluida</option>
            </select>
          </label>
          <label>
            Responsavel
            <input type="text" name="assignee" />
          </label>
          <button type="submit">Salvar alteracoes</button>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
